kernel:
  tick_ms: 1
  max_agents: 10000

llm:
  providers:
    - name: mock-local
      type: mock
    - name: openai-prod
      type: openai
      api_key_env: OPENAI_API_KEY
    - name: anthropic-prod
      type: anthropic
      api_key_env: ANTHROPIC_API_KEY
    - name: vllm-local
      type: vllm
      endpoint: http://localhost:8000
  model_routes:
    mock-llm-v1: mock-local
    gpt-4o-mini: openai-prod
    claude-3-5-haiku-latest: anthropic-prod
    llama-3.1-8b-instruct: vllm-local
  selection:
    default_model: mock-llm-v1
    profiles:
      fast: gpt-4o-mini
      quality: claude-3-5-haiku-latest
      local: llama-3.1-8b-instruct
      offline: mock-llm-v1
    capability_routes:
      coding: gpt-4o-mini
      analysis: claude-3-5-haiku-latest
      local_inference: llama-3.1-8b-instruct

security:
  encryption:
    at_rest: AES-256
    in_transit: TLS1.3
    pfs: true
  zero_trust: true
  audit: true

transport:
  type: inmemory
  relay_url: http://localhost:8080
  nats_url: nats://localhost:4222

persistence:
  backend: sqlite
  sqlite_path: ./data/koii_events.db

infrastructure:
  name: global-ai-cluster
  nodes:
    - id: na-node-1
      region: NA
      cpu_total: 64
      cpu_used: 8
      memory_total_mb: 131072
      memory_used_mb: 16384
      gpu_total: 4
      gpu_used: 1
    - id: eu-node-1
      region: EU
      cpu_total: 48
      cpu_used: 12
      memory_total_mb: 98304
      memory_used_mb: 24576
      gpu_total: 2
      gpu_used: 0

collaboration:
  workflows:
    - name: research-and-report
      region: NA
      max_iterations: 2
      resources:
        cpu: 4
        memory_mb: 4096
        gpu: 0
      goals:
        - id: collect-signals
          goal: Collect project signals from workspace and summarize risks.
          cwd: .
          retry_limit: 1
        - id: synthesize-brief
          goal: Create a concise executive brief from collected signals.
          cwd: .
          retry_limit: 1

automation:
  enabled: true
  default_agent_id: orchestrator-1
  allowed_shell_commands:
    - pwd
    - whoami
    - ls
    - uname
    - echo
  startup_tasks:
    - id: system-readiness
      description: Inspect local environment and summarize readiness
      steps:
        - type: shell
          command: whoami
        - type: shell
          command: pwd
        - type: list_dir
          path: .
        - type: model
          model: mock-llm-v1
          prompt: Summarize the current host readiness for AIOS startup checks.

messaging:
  telegram:
    bot_token: ""
    chat_id: ""
  whatsapp:
    access_token: ""
    phone_number_id: ""
    recipient: ""

workspace:
  path: .

autonomy:
  enabled: true
  default_agent_id: orchestrator-1
  planner_model: mock-llm-v1
  max_iterations: 2
  goal_tasks:
    - id: workspace-health-goal
      goal: Inspect the current workspace and summarize what AIOS can operate on automatically.
      cwd: .
      retry_limit: 2
    - id: browser-web-scrape-goal
      goal: Navigate to https://example.com and take a screenshot of the page to verify browser automation works.
      cwd: .
      retry_limit: 1

daemon:
  enabled: true
  mode: bounded
  poll_interval_s: 0.1
  max_cycles: 2
  default_agent_id: orchestrator-1
  max_iterations: 2
  goal_tasks:
    - id: daemon-workspace-health
      goal: Re-check the workspace periodically and report if AIOS automation still has access.
      cwd: .
      retry_limit: 1

agents:
  - id: orchestrator-1
    type: orchestration
    priority: 100
    cpu_quota: 2
    memory_mb: 512
    roles: [orchestrator]
    attributes:
      env: prod
      region: global

  - id: task-1
    type: task
    priority: 60
    cpu_quota: 1
    memory_mb: 256
    roles: [worker]
    attributes:
      domain: nlp
      env: prod

  - id: task-2
    type: task
    priority: 50
    cpu_quota: 1
    memory_mb: 256
    roles: [worker]
    attributes:
      domain: reasoning
      env: prod

  - id: compute-1
    type: compute
    priority: 70
    cpu_quota: 4
    memory_mb: 1024
    roles: [compute]
    attributes:
      gpu: false
      env: prod

  - id: system-1
    type: system
    priority: 90
    cpu_quota: 1
    memory_mb: 256
    roles: [system]
    attributes:
      responsibility: health-monitor
