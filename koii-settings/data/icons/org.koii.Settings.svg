<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" version="1.1" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3584e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c71d8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#62a0ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3584e4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="56" fill="url(#gradient1)" opacity="0.95"/>
  
  <!-- Gear/Settings icon -->
  <g transform="translate(64, 64)">
    <!-- Outer gear teeth -->
    <path d="M 0,-40 L 6,-36 L 6,-28 L 0,-24 L -6,-28 L -6,-36 Z" fill="url(#gradient2)" transform="rotate(0)"/>
    <path d="M 0,-40 L 6,-36 L 6,-28 L 0,-24 L -6,-28 L -6,-36 Z" fill="url(#gradient2)" transform="rotate(60)"/>
    <path d="M 0,-40 L 6,-36 L 6,-28 L 0,-24 L -6,-28 L -6,-36 Z" fill="url(#gradient2)" transform="rotate(120)"/>
    <path d="M 0,-40 L 6,-36 L 6,-28 L 0,-24 L -6,-28 L -6,-36 Z" fill="url(#gradient2)" transform="rotate(180)"/>
    <path d="M 0,-40 L 6,-36 L 6,-28 L 0,-24 L -6,-28 L -6,-36 Z" fill="url(#gradient2)" transform="rotate(240)"/>
    <path d="M 0,-40 L 6,-36 L 6,-28 L 0,-24 L -6,-28 L -6,-36 Z" fill="url(#gradient2)" transform="rotate(300)"/>
    
    <!-- Main gear body -->
    <circle cx="0" cy="0" r="24" fill="#ffffff" opacity="0.95"/>
    
    <!-- Center hole -->
    <circle cx="0" cy="0" r="10" fill="url(#gradient1)"/>
    
    <!-- AI Brain symbol overlay -->
    <g opacity="0.8">
      <!-- Neural network nodes -->
      <circle cx="-8" cy="-8" r="2.5" fill="#3584e4"/>
      <circle cx="8" cy="-8" r="2.5" fill="#3584e4"/>
      <circle cx="-8" cy="8" r="2.5" fill="#3584e4"/>
      <circle cx="8" cy="8" r="2.5" fill="#3584e4"/>
      <circle cx="0" cy="0" r="2.5" fill="#1c71d8"/>
      
      <!-- Neural connections -->
      <line x1="-8" y1="-8" x2="0" y2="0" stroke="#3584e4" stroke-width="1.5" opacity="0.6"/>
      <line x1="8" y1="-8" x2="0" y2="0" stroke="#3584e4" stroke-width="1.5" opacity="0.6"/>
      <line x1="-8" y1="8" x2="0" y2="0" stroke="#3584e4" stroke-width="1.5" opacity="0.6"/>
      <line x1="8" y1="8" x2="0" y2="0" stroke="#3584e4" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Subtle shadow effect -->
  <circle cx="64" cy="66" r="56" fill="#000000" opacity="0.1"/>
</svg>

