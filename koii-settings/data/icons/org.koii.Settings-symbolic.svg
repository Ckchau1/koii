<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" version="1.1" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(8, 8)">
    <!-- Simplified gear for symbolic icon -->
    <!-- Outer gear teeth (6 teeth) -->
    <rect x="-1" y="-7" width="2" height="2" fill="currentColor"/>
    <rect x="-1" y="5" width="2" height="2" fill="currentColor"/>
    <rect x="-7" y="-1" width="2" height="2" fill="currentColor"/>
    <rect x="5" y="-1" width="2" height="2" fill="currentColor"/>
    <rect x="-5" y="-5" width="2" height="2" fill="currentColor" transform="rotate(45)"/>
    <rect x="3" y="-5" width="2" height="2" fill="currentColor" transform="rotate(45)"/>
    
    <!-- Main gear body -->
    <circle cx="0" cy="0" r="4" fill="currentColor"/>
    
    <!-- Center hole -->
    <circle cx="0" cy="0" r="1.5" fill="none" stroke="currentColor" stroke-width="0.5"/>
    
    <!-- AI indicator dots -->
    <circle cx="-2" cy="-2" r="0.5" fill="currentColor" opacity="0.7"/>
    <circle cx="2" cy="-2" r="0.5" fill="currentColor" opacity="0.7"/>
    <circle cx="0" cy="2" r="0.5" fill="currentColor" opacity="0.7"/>
  </g>
</svg>

