name: NATS Mesh Integration

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  nats-multinode-test:
    runs-on: ubuntu-24.04

    services:
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NATS multi-node integration test
        env:
          KOII_TRANSPORT_TYPE: nats
          KOII_NATS_URL: nats://127.0.0.1:4222
        run: |
          python scripts/nats_multinode_integration.py coordinator
