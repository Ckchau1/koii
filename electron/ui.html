<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koii Min Browser</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .toolbar { display: flex; gap: 8px; padding: 12px; background: #111; color: #fff; align-items: center; }
    .toolbar input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #444; }
    .toolbar button { padding: 8px 14px; border-radius: 4px; border: none; background: #2d8cff; color: #fff; cursor: pointer; }
    .status { padding: 12px; background: #f1f1f1; border-top: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="urlInput" type="text" placeholder="Enter URL or search query" />
    <button id="goButton">Go</button>
    <button id="newTabButton">New Tab</button>
    <button id="refreshButton">Refresh</button>
    <button id="tabsButton">List Tabs</button>
  </div>
  <div class="status" id="status">Waiting for browser...</div>
  <script src="renderer.js"></script>
</body>
</html>
