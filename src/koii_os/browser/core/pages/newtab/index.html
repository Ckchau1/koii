<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Welcome to AI Min Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 60px 40px;
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #666;
      margin-bottom: 30px;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 40px 0;
      text-align: left;
    }

    .feature {
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .feature-title {
      font-weight: 600;
      margin-bottom: 5px;
      color: #333;
    }

    .feature-desc {
      font-size: 14px;
      color: #666;
    }

    .cta {
      margin-top: 40px;
    }

    .cta-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Welcome to AI Min Browser</h1>
    <p>Your privacy-first browser with AI superpowers</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">💬</div>
        <div class="feature-title">AI Chat</div>
        <div class="feature-desc">Chat with Claude while browsing</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div class="feature-title">Privacy First</div>
        <div class="feature-desc">Your data stays local</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🚀</div>
        <div class="feature-title">Fast</div>
        <div class="feature-desc">Lightweight and blazing fast</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <div class="feature-title">Smart</div>
        <div class="feature-desc">AI-powered automation</div>
      </div>
    </div>

    <div class="cta">
      <p style="margin-bottom: 20px; font-size: 14px; color: #999;">Start by opening a new tab or entering a URL in the address bar</p>
      <button class="cta-button" onclick="window.location.href='https://www.google.com'">Open Google</button>
    </div>
  </div>
</body>
</html>
